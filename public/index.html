<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Web Search Agent</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      background: #f4f7fb;
      color: #1f2937;
    }

    .container {
      max-width: 760px;
      margin: 48px auto;
      padding: 24px;
      background: #ffffff;
      border: 1px solid #dbe3ee;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    p {
      line-height: 1.5;
    }

    form {
      display: grid;
      gap: 12px;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      resize: vertical;
      font: inherit;
      box-sizing: border-box;
    }

    button {
      width: fit-content;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: #ffffff;
      font: inherit;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: progress;
    }

    .status {
      margin-top: 16px;
      font-weight: 600;
    }

    .result {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid #e5e7eb;
    }

    .sources {
      padding-left: 20px;
    }

    .sources li + li {
      margin-top: 8px;
    }

    .sources a {
      color: #2563eb;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>AI Web Search Agent</h1>
    <p>Ask a question and the app will search the web, summarize the result, and show the sources it used.</p>

    <form id="agent-form">
      <label for="question">Question</label>
      <textarea id="question" name="question" placeholder="Example: What are the latest specs in MacBook this year?" required></textarea>
      <button type="submit" id="submit-button">Ask</button>
    </form>

    <div class="status" id="status"></div>

    <section class="result" id="result" hidden>
      <h2>Answer</h2>
      <p id="answer"></p>
      <h3>Sources</h3>
      <ul class="sources" id="sources"></ul>
    </section>
  </main>

  <script>
    const form = document.getElementById("agent-form");
    const questionInput = document.getElementById("question");
    const submitButton = document.getElementById("submit-button");
    const statusElement = document.getElementById("status");
    const resultSection = document.getElementById("result");
    const answerElement = document.getElementById("answer");
    const sourcesElement = document.getElementById("sources");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const question = questionInput.value.trim();
      if (!question) {
        statusElement.textContent = "Please enter a question.";
        resultSection.hidden = true;
        return;
      }

      submitButton.disabled = true;
      statusElement.textContent = "Searching and generating answer...";
      resultSection.hidden = true;
      sourcesElement.innerHTML = "";

      try {
        const response = await fetch("/api/ask", {
          method: "POST",
          headers: {
            "content-type": "application/json"
          },
          body: JSON.stringify({ question })
        });

        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || "Request failed.");
        }

        answerElement.textContent = payload.answer;
        sourcesElement.innerHTML = "";

        for (const source of payload.sources || []) {
          const item = document.createElement("li");
          const link = document.createElement("a");
          link.href = source.url;
          link.target = "_blank";
          link.rel = "noreferrer";
          link.textContent = source.url;
          item.appendChild(link);
          sourcesElement.appendChild(item);
        }

        resultSection.hidden = false;
        statusElement.textContent = "Done.";
      } catch (error) {
        statusElement.textContent = error.message;
        resultSection.hidden = true;
      } finally {
        submitButton.disabled = false;
      }
    });
  </script>
</body>
</html>
